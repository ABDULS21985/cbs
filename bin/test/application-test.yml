spring:
  application:
    name: cbs-core-banking-test

  datasource:
    url: jdbc:tc:postgresql:16-alpine:///cbs_test
    driver-class-name: org.testcontainers.jdbc.ContainerDatabaseDriver

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        default_schema: cbs

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
    schemas:
      - cbs
    default-schema: cbs

  data:
    redis:
      host: localhost
      port: 6379

  cache:
    type: none

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8180/realms/cbs

server:
  servlet:
    context-path: /api

logging:
  level:
    com.cbs: DEBUG
    org.hibernate.SQL: DEBUG

cbs:
  security:
    cors:
      allowed-origins: http://localhost:3000
  pagination:
    default-page-size: 20
    max-page-size: 100
