spring:
  application:
    name: cbs-core-banking-test

  datasource:
    url: ${CBS_TEST_DB_URL:jdbc:postgresql://localhost:5432/cbs}
    username: ${CBS_TEST_DB_USERNAME:cbs_admin}
    password: ${CBS_TEST_DB_PASSWORD:cbs_password}
    driver-class-name: ${CBS_TEST_DB_DRIVER:org.postgresql.Driver}

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        default_schema: cbs

  flyway:
    enabled: true
    baseline-on-migrate: false
    validate-on-migrate: true
    locations: classpath:db/migration
    schemas:
      - cbs
    default-schema: cbs

  data:
    redis:
      host: localhost
      port: 6379

  cache:
    type: none

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8180/realms/cbs

server:
  servlet:
    context-path: /api

management:
  defaults:
    metrics:
      export:
        enabled: true
  prometheus:
    metrics:
      export:
        enabled: true
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
      show-components: always
      probes:
        enabled: true

logging:
  level:
    com.cbs: DEBUG
    org.hibernate.SQL: DEBUG

cbs:
  security:
    cors:
      allowed-origins: http://localhost:3000
    public-paths:
      - /v1/**
      - /error
  pagination:
    default-page-size: 20
    max-page-size: 100
