# ⚠️  WARNING: This profile (loadtest) disables ALL JWT authentication and grants every
# request ROLE_CBS_ADMIN via a synthetic principal.  It MUST NOT be activated in any
# environment that holds real customer data or is reachable from the internet.
# Activate only on isolated, ephemeral load-test infrastructure with no production data.
# Required env vars (no safe defaults — the app will fail to start if unset):
#   CBS_LOADTEST_DB_URL, CBS_LOADTEST_DB_USERNAME, CBS_LOADTEST_DB_PASSWORD

spring:
  datasource:
    url: ${CBS_LOADTEST_DB_URL:jdbc:postgresql://localhost:5432/cbs}
    username: ${CBS_LOADTEST_DB_USERNAME:cbs_admin}
    # No default password — must be supplied explicitly via CBS_LOADTEST_DB_PASSWORD
    password: ${CBS_LOADTEST_DB_PASSWORD}
    driver-class-name: ${CBS_LOADTEST_DB_DRIVER:org.postgresql.Driver}

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        default_schema: cbs

  flyway:
    enabled: true
    baseline-on-migrate: false
    validate-on-migrate: true
    locations: classpath:db/migration
    schemas:
      - cbs
    default-schema: cbs

  data:
    redis:
      host: ${CBS_LOADTEST_REDIS_HOST:localhost}
      port: ${CBS_LOADTEST_REDIS_PORT:6379}

  cache:
    type: none

  security:
    oauth2:
      resourceserver:
        jwt:
          # Intentionally blank — LoadTestSecurityConfig (@Profile("loadtest")) disables
          # OAuth2 resource-server entirely and uses a synthetic principal instead.
          # Do not fill in a real issuer-uri here; that would create a false sense of security.
          issuer-uri:

server:
  servlet:
    context-path: /api

management:
  defaults:
    metrics:
      export:
        enabled: true
  prometheus:
    metrics:
      export:
        enabled: true
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
      show-components: always
      probes:
        enabled: true

logging:
  level:
    com.cbs: INFO
    org.springframework: WARN
    org.springframework.web: WARN
    org.springframework.web.servlet: WARN
    org.springframework.web.servlet.mvc.method.annotation: WARN
    org.hibernate.SQL: WARN

cbs:
  kyc:
    provider: INTERNAL
  simulation:
    allow-synthetic-services: true
    allow-internal-kyc: true
  security:
    cors:
      allowed-origins: http://localhost:3000
    public-paths:
      - /actuator/health
      - /actuator/prometheus
      - /v3/api-docs/**
      - /swagger-ui/**
      - /swagger-ui.html
      - /error
  pagination:
    default-page-size: 20
    max-page-size: 100
