spring:
  application:
    name: cbs-core-banking

  datasource:
    url: ${CBS_DB_URL:jdbc:postgresql://localhost:5432/cbs}
    username: ${CBS_DB_USERNAME:cbs_admin}
    password: ${CBS_DB_PASSWORD:}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      idle-timeout: 300000
      connection-timeout: 20000
      max-lifetime: 1200000
      pool-name: cbs-hikari-pool

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false
        jdbc:
          time_zone: UTC
          batch_size: 50
        order_inserts: true
        order_updates: true
        generate_statistics: false
        default_schema: cbs

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
    schemas:
      - cbs
    default-schema: cbs
    table: flyway_schema_history

  jackson:
    serialization:
      write-dates-as-timestamps: false
      fail-on-empty-beans: false
    deserialization:
      fail-on-unknown-properties: false
    default-property-inclusion: non_null

  data:
    redis:
      host: ${CBS_REDIS_HOST:localhost}
      port: ${CBS_REDIS_PORT:6379}
      timeout: 5000

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${CBS_OAUTH2_ISSUER_URI:http://localhost:8180/realms/cbs}

  cache:
    type: redis
    redis:
      time-to-live: 600000

server:
  port: ${CBS_SERVER_PORT:8080}
  servlet:
    context-path: /api
  error:
    include-message: never
    include-binding-errors: never
    include-stacktrace: never

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui
    tags-sorter: alpha
    operations-sorter: method

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized

logging:
  level:
    com.cbs: ${CBS_LOG_LEVEL:INFO}
    org.springframework.security: WARN
    org.hibernate.SQL: WARN
  pattern:
    console: "%d{ISO8601} [%thread] %-5level [%X{traceId:-}] %logger{36} - %msg%n"

cbs:
  security:
    cors:
      allowed-origins: ${CBS_CORS_ORIGINS:http://localhost:3000}
    public-paths:
      - /v3/api-docs/**
      - /swagger-ui/**
      - /swagger-ui.html
      - /actuator/health
  pagination:
    default-page-size: 20
    max-page-size: 100
