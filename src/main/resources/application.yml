spring:
  application:
    name: cbs-core-banking

  datasource:
    url: ${CBS_DB_URL:jdbc:postgresql://localhost:5432/cbs}
    username: ${CBS_DB_USERNAME:cbs_admin}
    password: ${CBS_DB_PASSWORD:}
    hikari:
      maximum-pool-size: ${CBS_DB_POOL_MAX:20}
      minimum-idle: ${CBS_DB_POOL_MIN:5}
      idle-timeout: 300000
      connection-timeout: 20000
      max-lifetime: 1200000
      pool-name: cbs-hikari-pool

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false
        jdbc:
          time_zone: UTC
          batch_size: 50
        order_inserts: true
        order_updates: true
        generate_statistics: false
        default_schema: cbs

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
    schemas:
      - cbs
    default-schema: cbs
    table: flyway_schema_history

  jackson:
    use-jackson2-defaults: true

  jackson2:
    serialization:
      write-dates-as-timestamps: false
      fail-on-empty-beans: false
    deserialization:
      fail-on-unknown-properties: false
    default-property-inclusion: non_null

  mail:
    host: ${CBS_MAIL_HOST:localhost}
    port: ${CBS_MAIL_PORT:1025}
    username: ${CBS_MAIL_USERNAME:}
    password: ${CBS_MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: ${CBS_MAIL_AUTH:false}
          starttls:
            enable: ${CBS_MAIL_STARTTLS:false}
    # Default points to MailHog/Mailpit for local dev.
    # In production, set CBS_MAIL_HOST, CBS_MAIL_PORT, CBS_MAIL_AUTH=true, CBS_MAIL_STARTTLS=true.

  data:
    redis:
      host: ${CBS_REDIS_HOST:localhost}
      port: ${CBS_REDIS_PORT:6379}
      timeout: 5000

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${CBS_OAUTH2_ISSUER_URI:}

  cache:
    type: ${CBS_CACHE_TYPE:redis}
    redis:
      time-to-live: 600000

server:
  port: ${CBS_SERVER_PORT:8080}
  servlet:
    context-path: /api
  error:
    include-message: never
    include-binding-errors: never
    include-stacktrace: never

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui
    tags-sorter: alpha
    operations-sorter: method

management:
  defaults:
    metrics:
      export:
        enabled: true
  prometheus:
    metrics:
      export:
        enabled: true
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized

logging:
  level:
    com.cbs: ${CBS_LOG_LEVEL:INFO}
    org.springframework.security: WARN
    org.hibernate.SQL: WARN
  pattern:
    console: "%d{ISO8601} [%thread] %-5level [%X{traceId:-}] %logger{36} - %msg%n"

# ============================================================
# CBS GLOBAL CONFIGURATION — No country-specific defaults
# Override per deployment via profiles or environment variables
# ============================================================
cbs:
  deployment:
    country-code: ${CBS_COUNTRY_CODE:GLOBAL}
    default-currency: ${CBS_DEFAULT_CURRENCY:USD}
    timezone: ${CBS_TIMEZONE:UTC}
    locale: ${CBS_LOCALE:en}
    institution-name: ${CBS_INSTITUTION_NAME:Core Banking System}
    institution-code: ${CBS_INSTITUTION_CODE:}
    regulatory-body: ${CBS_REGULATORY_BODY:}
    multi-tenant: ${CBS_MULTI_TENANT:false}

  account:
    numbering-scheme: ${CBS_ACCOUNT_NUMBERING:SEQUENTIAL}
    number-prefix: ${CBS_ACCOUNT_PREFIX:}
    number-length: ${CBS_ACCOUNT_LENGTH:10}
    iban-country-code: ${CBS_IBAN_COUNTRY:}
    iban-bank-code: ${CBS_IBAN_BANK:}
    cif-prefix: ${CBS_CIF_PREFIX:CIF}
    cif-length: ${CBS_CIF_LENGTH:10}
    txn-ref-prefix: ${CBS_TXN_PREFIX:TXN}

  interest:
    day-count-convention: ${CBS_DAY_COUNT:ACT_365}
    calculation-scale: 4
    posting-scale: 2
    accrue-on-weekends: true
    accrue-on-holidays: true

  ledger:
    default-branch-code: ${CBS_LEDGER_BRANCH:HEAD}
    opening-balance-contra-gl-code: ${CBS_LEDGER_OPENING_BALANCE_GL:}
    external-clearing-gl-code: ${CBS_LEDGER_EXTERNAL_CLEARING_GL:}
    wallet-settlement-gl-code: ${CBS_LEDGER_WALLET_SETTLEMENT_GL:}
    remittance-settlement-gl-code: ${CBS_LEDGER_REMITTANCE_SETTLEMENT_GL:${CBS_LEDGER_EXTERNAL_CLEARING_GL:}}
    fixed-deposit-control-gl-code: ${CBS_LEDGER_FIXED_DEPOSIT_GL:}
    recurring-deposit-control-gl-code: ${CBS_LEDGER_RECURRING_DEPOSIT_GL:}
    savings-goal-control-gl-code: ${CBS_LEDGER_SAVINGS_GOAL_GL:}
    overdraft-asset-gl-code: ${CBS_LEDGER_OVERDRAFT_ASSET_GL:}
    trade-finance-settlement-gl-code: ${CBS_LEDGER_TRADE_FINANCE_SETTLEMENT_GL:${CBS_LEDGER_EXTERNAL_CLEARING_GL:}}
    trade-finance-commission-income-gl-code: ${CBS_LEDGER_TRADE_FINANCE_COMMISSION_GL:}

  kyc:
    provider: ${CBS_KYC_PROVIDER:}
    provider-base-url: ${CBS_KYC_URL:}
    provider-timeout-seconds: 30
    require-verified-id: false
    id-types: []

  lifecycle:
    default-dormancy-days: ${CBS_DORMANCY_DAYS:365}
    escheatment-years: ${CBS_ESCHEATMENT_YEARS:6}
    interest-accrual-cron: ${CBS_INTEREST_CRON:0 30 23 * * *}
    dormancy-detection-cron: ${CBS_DORMANCY_CRON:0 0 0 * * *}
    escheatment-detection-cron: ${CBS_ESCHEATMENT_CRON:0 0 1 1 * *}

  simulation:
    allow-synthetic-services: ${CBS_ALLOW_SYNTHETIC_SERVICES:false}
    allow-internal-kyc: ${CBS_ALLOW_INTERNAL_KYC:false}

  keycloak:
    admin:
      server-url: ${CBS_KEYCLOAK_URL:}
      realm: ${CBS_KEYCLOAK_REALM:cbs}
      client-id: ${CBS_KEYCLOAK_ADMIN_CLIENT_ID:cbs-admin-cli}
      client-secret: ${CBS_KEYCLOAK_ADMIN_CLIENT_SECRET:}

  security:
    cors:
      allowed-origins: ${CBS_CORS_ORIGINS:}
    jwt:
      accepted-audiences: ${CBS_OAUTH2_ACCEPTED_AUDIENCES:cbs-app}
    public-paths:
      - /v3/api-docs/**
      - /swagger-ui/**
      - /swagger-ui.html
      - /actuator/health

  pagination:
    default-page-size: 20
    max-page-size: 100
